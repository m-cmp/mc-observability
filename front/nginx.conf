server {
    listen 18081;
    root /usr/share/nginx/html;
    index index.html;

    location /api/o11y/ {
        proxy_pass http://mc-observability-manager:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        # Agent install/uninstall (kubeconfig + Job) can run long; avoid 504 on slow nodes.
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /tumblebug/ {
        proxy_pass http://mc-infra-manager:1323;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization "Basic ZGVmYXVsdDpkZWZhdWx0";
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
    }

    location /spider/ {
        proxy_pass http://mc-infra-connector:1024;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization "Basic ZGVmYXVsdDpkZWZhdWx0";
        proxy_set_header Origin "";
    }

    # Hashed build assets are immutable (filename changes on every build) → cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must always be revalidated so a redeploy (new asset hashes) is picked up
    # immediately instead of the browser serving a stale page that 404s its old bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri /index.html;
    }
}
