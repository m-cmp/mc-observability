      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/ResBodyQuery'
          examples:
            application/json: &id003
              data:
                message: 'I''ve analyzed the error logs from the past hour and identified 3 critical issues: 1) Database connection
                  timeout errors (15 occurrences), 2) Authentication service failures (8 occurrences), 3) Memory allocation
                  errors (3 occurrences). The root cause appears to be network connectivity issues between the application
