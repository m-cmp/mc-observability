      summary: Predict Mci
      description: Predict future metrics (cpu, mem, disk, system) for a given mci group.
      operationId: PostPredictionMCI
      produces:
      - application/json
      consumes:
      - application/json
      parameters:
      - name: nsId
        in: path
        description: The Namespace ID for the prediction.
        required: true
        type: string
      - name: mciId
        in: path
        description: The MCI ID for the prediction.
        required: true
        type: string
      - in: body
        name: ''
        required: true
        schema:
          $ref: '#/definitions/PredictionBody'
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/ResBodyPredictionMCIResult'
          examples:
            application/json: &id001
              data:
                mci_id: string
                measurement: cpu
                ns_id: string
                values:
                - timestamp: 2024-08-22 00:00:00+00:00
                  value: 75
                - timestamp: 2024-08-22 01:00:00+00:00
                  value: 78
                - timestamp: 2024-08-22 02:00:00+00:00
                  value: 80
              rs_code: '200'
              rs_msg: Success
        '422':
          description: ''
          schema:
            $ref: '#/definitions/HTTPValidationError'
          examples:
            application/json: *id001
