definitions:
  TriggerPolicyNotiChannelUpdateRequest:
    required:
    - channelName
    - recipients
    type: object
    properties:
      channelName:
        type: string
        description: Notification channel name
        example: email_smtp.gmail.com
      recipients:
        type: array
        items:
          type: string
  ResBodyVoid:
    type: object
    properties:
      rs_code:
        type: string
        description: Response code
        example: '0000'
      rs_msg:
        type: string
        description: Response message
        example: success
      data:
        type: object
      error_message:
        type: string
        description: Error message
  TriggerHistoryCommentUpdateRequest:
    required:
    - comment
    type: object
    properties:
      comment:
        type: string
        description: Comment for trigger history
        example: Alert resolved - false positive
  VMRequestDTO:
    required:
    - name
    type: object
    properties:
      name:
        type: string
        description: VM name
        example: mcmp-vm
      description:
        type: string
        description: VM description
        example: string
  ResBodyVMDTO:
    type: object
    properties:
      rs_code:
        type: string
        description: Response code
        example: '0000'
      rs_msg:
        type: string
        description: Response message
        example: success
      data:
        $ref: '#/definitions/VMDTO'
      error_message:
        type: string
        description: Error message
  VMDTO:
    type: object
    properties:
      name:
        type: string
        description: VM name
        example: mcmp-vm
      description:
        type: string
        description: VM description
        example: string
      vm_id:
        type: string
        description: VM ID
        example: vm-1
      influx_seq:
        type: integer
        format: int64
      vm_status:
        type: string
        enum:
        - RUNNING
        - FAILED
      monitoring_service_status:
        type: string
        enum:
        - ACTIVE
        - INACTIVE
        - NOT_EXIST
        - FAILED
      log_service_status:
        type: string
        enum:
        - ACTIVE
        - INACTIVE
        - NOT_EXIST
        - FAILED
      ns_id:
        type: string
        description: Namespace ID
        example: ns-1
      mci_id:
        type: string
        description: MCI ID
        example: mci-1
      monitoring_agent_status:
        type: string
        description: Monitoring agent status
        example: SUCCESS
        enum:
        - INSTALLING
        - SERVICE_INACTIVE
        - SUCCESS
        - FAILED
      log_agent_status:
        type: string
        description: Log agent status
        example: SUCCESS
        enum:
        - INSTALLING
        - SERVICE_INACTIVE
        - SUCCESS
        - FAILED
  MonitoringItemUpdateDTO:
    type: object
    properties:
      seq:
        type: integer
        format: int64
      pluginConfig:
        type: string
  ThresholdCondition:
    type: object
    properties:
      info:
        minimum: 0
        type: number
        format: double
      warning:
        minimum: 0
        type: number
        format: double
      critical:
        minimum: 0
        type: number
        format: double
  TriggerPolicyCreateRequest:
    required:
    - aggregationType
    - description
    - holdDuration
    - repeatInterval
    - resourceType
    - thresholdCondition
    - title
    type: object
    properties:
      title:
        type: string
        description: Policy title
        example: CPU Alert Policy
      description:
        type: string
        description: Policy description
        example: Alert when CPU usage is high
      thresholdCondition:
        $ref: '#/definitions/ThresholdCondition'
      resourceType:
        type: string
        description: Resource type
        example: CPU
        enum:
        - CPU
        - MEMORY
        - DISK
      aggregationType:
        type: string
        description: Aggregation type
        example: LAST
        enum:
        - MIN
        - MAX
        - AVG
        - LAST
      holdDuration:
        pattern: ^([0-9]|[1-5][0-9]|60)[sm]$
        type: string
        description: Hold duration
        example: 0m
      repeatInterval:
        pattern: ^([1-9]|1[0-9]|2[0-4])h$
        type: string
        description: Repeat interval
        example: 1h
  ResBodyMapStringLong:
    type: object
    properties:
      rs_code:
        type: string
        description: Response code
        example: '0000'
      rs_msg:
        type: string
        description: Response message
        example: success
      data:
        type: object
        additionalProperties:
          type: integer
          format: int64
      error_message:
        type: string
        description: Error message
  TriggerVMAddRequest:
    required:
    - namespaceId
    - targetId
    - targetScope
    type: object
    properties:
      namespaceId:
        type: string
        description: Namespace ID
        example: first-ns
      targetScope:
        type: string
        description: Target scope
        example: mci
      targetId:
        type: string
        description: Target ID
        example: test01
  MonitoringItemRequestDTO:
    type: object
    properties:
      pluginSeq:
        type: integer
        description: Plugin sequence
        format: int64
        example: 0
      pluginConfig:
        type: string
        description: Plugin configuration
        example: string
  ConditionInfo:
    type: object
    properties:
      key:
        type: string
        description: Condition key
        example: cpu
      value:
        type: string
        description: Condition value
        example: cpu-total
    description: List of condition filters
