                provider: openai
                regdate: 2025-09-17 14:12:36
                seq: 1
                session_id: 986ef65f-e425-478a-b84c-03fa80682f36
                user_id: '1'
              - model_name: llama3.1:8b
                provider: ollama
                regdate: 2025-09-18 11:46:49
                seq: 2
                session_id: 40dadcfa-98d6-4d5b-9745-669928c496b7
                user_id: '1'
