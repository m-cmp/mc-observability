              \       \"baseUrl\" : null,\n        \"isActive\" : true,\n        \"recipients\" : [ \"example@gmail.com\"\
              \ ]\n      }, {\n        \"id\" : 2,\n        \"name\" : \"slack\",\n        \"type\" : \"slack\",\n       \
              \ \"provider\" : \"slack\",\n        \"baseUrl\" : \"https://slack.com\",\n        \"isActive\" : true,\n  \
              \      \"recipients\" : [ \"C09M4LBEN68\" ]\n      }, {\n        \"id\" : 3,\n        \"name\" : \"kakao_naver-cloud\"\
              ,\n        \"type\" : \"kakao\",\n        \"provider\" : \"naver-cloud\",\n        \"baseUrl\" : \"https://sens.apigw.ntruss.com\"\
              ,\n        \"isActive\" : true,\n        \"recipients\" : [ \"01012345678\" ]\n      } ],\n      \"createdAt\"\
              \ : \"2025-10-17T03:26:05.442633\",\n      \"updatedAt\" : \"2025-10-17T03:26:05.442646\"\n    } ],\n    \"\
              pageable\" : {\n      \"pageNumber\" : 0,\n      \"pageSize\" : 10,\n      \"sort\" : {\n        \"empty\" :\
              \ false,\n        \"sorted\" : true,\n        \"unsorted\" : false\n      },\n      \"offset\" : 0,\n      \"\
              paged\" : true,\n      \"unpaged\" : false\n    },\n    \"totalPages\" : 1,\n    \"totalElements\" : 1,\n  \
              \  \"numberOfElements\" : 1\n  },\n  \"error_message\" : \"\"\n}"
