# CMP Windows OTel Java Auto-Instrumentation environment variables
# Placeholders below (prefixed with `at` sign) are substituted at runtime
# by OtelJavaConfigFacadeService: SITE_CODE, NS_ID, MCI_ID, VM_ID, OTEL_ENDPOINT, JAR_URL, JAR_PATH.
#
# Ansible playbook reads this file and applies each KEY=VALUE pair as a
# Windows machine-level environment variable via PowerShell (`setx /M` or
# `[Environment]::SetEnvironmentVariable(..., "Machine")`).

JAVA_TOOL_OPTIONS=-javaagent:@JAR_PATH
OTEL_EXPORTER_OTLP_ENDPOINT=@OTEL_ENDPOINT
OTEL_EXPORTER_OTLP_PROTOCOL=grpc
OTEL_SERVICE_NAME=cmp-otel-java-@SITE_CODE-@VM_ID
OTEL_RESOURCE_ATTRIBUTES=site_code=@SITE_CODE,ns_id=@NS_ID,mci_id=@MCI_ID,vm_id=@VM_ID
OTEL_METRICS_EXPORTER=none
OTEL_LOGS_EXPORTER=none
OTEL_TRACES_EXPORTER=otlp
OTEL_JAVA_AGENT_JAR_URL=@JAR_URL
OTEL_JAVA_AGENT_JAR_PATH=@JAR_PATH
