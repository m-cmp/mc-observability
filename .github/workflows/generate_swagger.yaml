name: Generate Swagger Documentation

on:
  push:
    branches:
      - main
    paths:
      - "java/mc-o11y-manager/src/**"
      - "python/insight/**"
      - "scripts/**"
      - "Makefile"
    paths-ignore:
      - "swagger/**"
      - "**.md"
  workflow_dispatch:

jobs:
  generate-swagger:
    runs-on: ubuntu-latest
    # Skip if the commit was auto-generated swagger update
    if: "!contains(github.event.head_commit.message, '(auto-generated)')"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: |
          cd python/insight
          uv sync

      - name: Grant Gradle wrapper permission
        run: chmod +x java/gradlew

      - name: Generate Swagger
        run: make swag

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet swagger/swagger.yaml 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No swagger changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Swagger changes detected."
          fi

      - name: Commit and push swagger
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add swagger/swagger.yaml
          git commit -m "feat: Update Swagger documentation (auto-generated)"
          git push origin HEAD:${GITHUB_REF_NAME}
